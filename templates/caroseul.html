<!-- 🌟 Carousel -->
<div id="mainCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
  <!-- Indicators -->
  <div class="carousel-indicators">
    <button
      type="button"
      data-bs-target="#mainCarousel"
      data-bs-slide-to="0"
      class="active"
    ></button>
    <button
      type="button"
      data-bs-target="#mainCarousel"
      data-bs-slide-to="1"
    ></button>
    <button
      type="button"
      data-bs-target="#mainCarousel"
      data-bs-slide-to="2"
    ></button>
  </div>

  <div class="carousel-inner rounded shadow">
    <!-- Slide 1 -->
    <div class="carousel-item active">
      <img
        src="{{ url_for('static', filename='images/slide1.jpg') }}"
        class="d-block w-100"
        alt="Slide 1"
      />
      <div class="carousel-caption d-none d-md-block">
        <h5 class="fw-bold">AI-Powered Fake Account Detection</h5>
        <p>
          Use advanced machine learning models to detect suspicious profiles
          instantly.
        </p>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="carousel-item">
      <img
        src="{{ url_for('static', filename='images/slide2.jpg') }}"
        class="d-block w-100"
        alt="Slide 2"
      />
      <div class="carousel-caption d-none d-md-block">
        <h5 class="fw-bold">Instagram, Facebook & Twitter</h5>
        <p>
          Analyze accounts from multiple social media platforms in one place.
        </p>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="carousel-item">
      <img
        src="{{ url_for('static', filename='images/slide3.jpg') }}"
        class="d-block w-100"
        alt="Slide 3"
      />
      <div class="carousel-caption d-none d-md-block">
        <h5 class="fw-bold">Fast & Accurate Results</h5>
        <p>Get instant predictions with high accuracy and reliability.</p>
      </div>
    </div>
  </div>

  <!-- Arrows -->
  <button
    class="carousel-control-prev"
    type="button"
    data-bs-target="#mainCarousel"
    data-bs-slide="prev"
  >
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button
    class="carousel-control-next"
    type="button"
    data-bs-target="#mainCarousel"
    data-bs-slide="next"
  >
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
